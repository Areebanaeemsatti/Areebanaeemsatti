<svg width="900" height="220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@700&amp;display=swap');
    </style>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bggrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="50%" stop-color="#050d05"/>
      <stop offset="100%" stop-color="#0a0515"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bggrad)" rx="10"/>

  <!-- Grid lines -->
  <g stroke="#00ff4108" stroke-width="0.5">
    <line x1="0" y1="20" x2="900" y2="20"/>
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="140" x2="900" y2="140"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="220"/>
    <line x1="120" y1="0" x2="120" y2="220"/>
    <line x1="180" y1="0" x2="180" y2="220"/>
    <line x1="240" y1="0" x2="240" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="360" y1="0" x2="360" y2="220"/>
    <line x1="420" y1="0" x2="420" y2="220"/>
    <line x1="480" y1="0" x2="480" y2="220"/>
    <line x1="540" y1="0" x2="540" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="660" y1="0" x2="660" y2="220"/>
    <line x1="720" y1="0" x2="720" y2="220"/>
    <line x1="780" y1="0" x2="780" y2="220"/>
    <line x1="840" y1="0" x2="840" y2="220"/>
  </g>

  <!-- Border glow -->
  <rect width="898" height="218" x="1" y="1" fill="none" stroke="#00ff41" stroke-width="1" rx="10" opacity="0.3"/>
  <rect width="894" height="214" x="3" y="3" fill="none" stroke="#00ff41" stroke-width="0.5" rx="9" opacity="0.1"/>

  <!-- Top label -->
  <text x="450" y="32" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="11" fill="#00ff41" opacity="0.6" letter-spacing="6">⚡ AI STUDENT | BUILDER | RESEARCHER ⚡</text>

  <!-- Main name - pixel/matrix font style -->
  <text x="450" y="118"
    text-anchor="middle"
    font-family="'Orbitron', 'Share Tech Mono', monospace"
    font-size="52"
    font-weight="700"
    fill="#00ff41"
    filter="url(#glow-green)"
    letter-spacing="3">AREEBA NAEEM</text>

  <text x="450" y="158"
    text-anchor="middle"
    font-family="'Orbitron', 'Share Tech Mono', monospace"
    font-size="38"
    font-weight="700"
    fill="#00ffff"
    filter="url(#glow-cyan)"
    letter-spacing="8">SATTI</text>

  <!-- Bottom tagline -->
  <text x="450" y="195" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="11" fill="#00ff4177" letter-spacing="3">&gt; Building intelligent systems that actually work_</text>

  <!-- Corner decorations -->
  <g stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.5">
    <polyline points="10,25 10,10 25,10"/>
    <polyline points="875,10 890,10 890,25"/>
    <polyline points="10,195 10,210 25,210"/>
    <polyline points="875,210 890,210 890,195"/>
  </g>

  <!-- Scan line animation -->
  <rect x="0" y="0" width="900" height="2" fill="#00ff41" opacity="0.06" rx="1">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,220" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Blinking cursor -->
  <rect x="644" y="138" width="12" height="4" fill="#00ffff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
